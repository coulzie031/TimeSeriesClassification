seed: 42
device: auto
num_workers: 2
batch_size: 64
grad_clip: 1.0
early_stopping_patience: 20
checkpoint_dir: checkpoints

data:
  normalize: true
  val_fraction: 0.2
  augment: true
  mixup_alpha: 0.0
  weighted_sampler: true

model:
  name: chronos
  dropout: 0.2
  unfreeze_last_n: 4
  chronos_model_id: amazon/chronos-t5-small
  device_map: null

loss:
  label_smoothing: 0.1
  focal_gamma: 2.0

stage1:
  epochs: 200
  lr: 1.0e-3
  weight_decay: 1.0e-4

stage2:
  epochs: 100
  lr: 5.0e-5
  weight_decay: 1.0e-4
  head_lr_scale: 10.0

wandb:
  project: lsst-tsfm
  entity: null
  run_name: chronos_t5_small
  mode: offline
