# MOMENT foundation model adaptation.
device: cuda
batch_size: 48

model:
  name: moment
  dropout: 0.2
  unfreeze_last_n: 3

loss:
  label_smoothing: 0.1

stage1:
  epochs: 15
  lr: 1.0e-3
  weight_decay: 1.0e-4

stage2:
  epochs: 30
  lr: 1.0e-5
  weight_decay: 1.0e-4
  head_lr_scale: 8.0

wandb:
  run_name: moment_adaptation
