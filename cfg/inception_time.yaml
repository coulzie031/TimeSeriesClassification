seed: 42
device: auto
num_workers: 2
batch_size: 64
grad_clip: 1.0
early_stopping_patience: 40
checkpoint_dir: checkpoints

data:
  normalize: true
  val_fraction: 0.2
  augment: true
  mixup_alpha: 0.3
  weighted_sampler: true

model:
  name: inception_time
  dropout: 0.2
  unfreeze_last_n: 0
  inception_nb_filters: 128

loss:
  label_smoothing: 0.05
  focal_gamma: 2.0

stage1:
  epochs: 300
  lr: 5.0e-4
  weight_decay: 5.0e-4

stage2:
  epochs: 0
  lr: 0.0
  weight_decay: 0.0
  head_lr_scale: 1.0

wandb:
  project: lsst-tsfm
  entity: null
  run_name: inception_time_xl
  mode: offline
