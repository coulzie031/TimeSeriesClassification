# Default config — shared across all models.
seed: 42
device: cuda
num_workers: 0
batch_size: 128
grad_clip: 1.0
checkpoint_dir: checkpoints

data:
  normalize: true
  val_fraction: 0.2

model:
  name: baseline_cnn
  dropout: 0.2
  unfreeze_last_n: 0
  baseline_width: 128
  chronos_model_id: amazon/chronos-2

loss:
  label_smoothing: 0.1

stage1:
  epochs: 10
  lr: 1.0e-3
  weight_decay: 1.0e-4

stage2:
  epochs: 20
  lr: 1.0e-5
  weight_decay: 1.0e-4
  head_lr_scale: 10.0

wandb:
  project: lsst-tsfm
  entity: null
  run_name: baseline_cnn
  mode: offline
